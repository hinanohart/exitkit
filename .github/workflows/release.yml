# SPDX-License-Identifier: MIT
# Release workflow: build → Sigstore Cosign keyless attest → PyPI token publish
# Triggered on v* tag push (e.g. v0.2.0rc1, v0.2.0).
# Uses PYPI_API_TOKEN secret (set in repo Settings > Secrets > Actions).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub release
  id-token: write   # OIDC for Sigstore keyless

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  sign:
    name: Sigstore keyless attest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts with Sigstore keyless
        run: |
          set -euo pipefail
          for f in dist/*.whl dist/*.tar.gz; do
            cosign sign-blob --yes --bundle "${f}.bundle" "$f"
          done

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: dist-signed
          path: dist/

  publish:
    name: Publish to PyPI
    needs: sign
    runs-on: ubuntu-latest
    steps:
      - name: Download signed dist
        uses: actions/download-artifact@v4
        with:
          name: dist-signed
          path: dist/

      - name: Publish to PyPI (token auth)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: false

  github-release:
    name: Create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download signed dist
        uses: actions/download-artifact@v4
        with:
          name: dist-signed
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
